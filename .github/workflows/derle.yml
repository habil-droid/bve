name: APK Derle

on:
  push:
  workflow_dispatch:

jobs:
  derle:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu indir
        uses: actions/checkout@v4

      - name: Proje zipini bul ve ac
        run: |
          set -e
          if [ -f "BasitVideoEditor.zip" ]; then ZIP="BasitVideoEditor.zip"; else ZIP=$(ls *.zip | head -n 1); fi
          echo "Zip: $ZIP"
          unzip -q "$ZIP" -d proje
          DIR=$(dirname $(find proje -name "settings.gradle.kts" -o -name "settings.gradle" | head -n 1))
          echo "PROJE_DIR=$DIR" >> $GITHUB_ENV
          echo "Proje klasoru: $DIR"

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK kur
        uses: android-actions/setup-android@v3

      - name: Gerekli SDK paketlerini kur
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Gradle 8.9 kur
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: APK derle
        run: gradle -p "$PROJE_DIR" assembleDebug --stacktrace

      - name: APK dosyasini Artifacts bolumune koy
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: ${{ env.PROJE_DIR }}/app/build/outputs/apk/debug/app-debug.apk

      - name: Releases sayfasina da ekle (basarisiz olursa onemsiz)
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: derleme-${{ github.run_number }}
          files: ${{ env.PROJE_DIR }}/app/build/outputs/apk/debug/app-debug.apk
